# ==================== Server Configuration (Test) ====================
server.port=8086

# ==================== Application Name ====================
spring.application.name=progress-service

# ==================== Database Configuration (H2 for Testing) ====================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================== JPA/Hibernate Configuration (Test) ====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_catalog=

# ==================== H2 Console ====================
spring.h2.console.enabled=true

# ==================== Security Configuration ====================
jwt.secret=testSecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitectureTest
jwt.expiration=86400000

# ==================== Certificate Configuration ====================
certificate.output.path=target/test-certificates/

# ==================== Logging Configuration (Test) ====================
logging.level.root=WARN
logging.level.com.edulearn.progress=INFO
logging.level.org.springframework.test=DEBUG

