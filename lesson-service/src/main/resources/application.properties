# ==================== Server Configuration ====================
server.port=${SERVER_PORT:8083}

# ==================== Application Name ====================
spring.application.name=lesson-service

# ==================== Database Configuration (Separate DB for lesson-service) ====================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edulearn_lesson?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}


# ==================== JPA/Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=false

# ==================== Security Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Microservice URLs ====================
enrollment.service.url=${ENROLLMENT_SERVICE_URL:http://localhost:8084/api/v1}

# ==================== Eureka Client Configuration ====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.edulearn.lesson=DEBUG

# ==================== Spring Cloud Compatibility ====================
spring.cloud.compatibility-verifier.enabled=false

# ==================== File Upload Configuration ====================
app.upload.path=${APP_UPLOAD_PATH:uploads/videos}
