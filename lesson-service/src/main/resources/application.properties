# ==================== Server Configuration ====================
server.port=${SERVER_PORT:8083}
server.servlet.context-path=/api/v1

# ==================== Database Configuration (Separate DB for lesson-service) ====================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edulearn_lesson?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# ==================== Security Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Application Name ====================
spring.application.name=lesson-service

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.edulearn.lesson=DEBUG
