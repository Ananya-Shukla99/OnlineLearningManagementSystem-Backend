tructure  s# ==================== Server Configuration ====================
server.port=${SERVER_PORT:8085}
server.servlet.context-path=/api/v1

# ==================== Application Name ====================
spring.application.name=payment-service

# ==================== Database Configuration ====================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/edulearn_payment?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true

# ==================== Security Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Razorpay Configuration ====================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_XXXXXXXXXXXXXXX}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:XXXXXXXXXXXXXXXXXXXXXXXX}

# ==================== Microservice URLs ====================
enrollment.service.url=${ENROLLMENT_SERVICE_URL:http://localhost:8082/api/v1}

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.edulearn.payment=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

