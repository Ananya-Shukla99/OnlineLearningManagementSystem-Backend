# ==================== Server Configuration ====================
server.port=8761
server.servlet.context-path=/

# ==================== Eureka Server Configuration ====================
spring.application.name=eureka-server

# Eureka Server should not register itself
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.server.wait-time-in-ms-when-sync-empty=0

# Eureka server configuration
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# ==================== Spring Cloud Compatibility ====================
# Disable version check as Spring Boot 3.5.13 is newer than Spring Cloud 2023.0.3 expects
spring.cloud.compatibility-verifier.enabled=false

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.netflix.eureka=WARN
logging.level.com.netflix.discovery=WARN

