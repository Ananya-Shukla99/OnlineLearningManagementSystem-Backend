# ==================== Server Configuration ====================
server.port=${SERVER_PORT:${ENROLLMENT_SERVER_PORT:8084}}
# server.servlet.context-path=/api/v1

# ==================== Database Configuration ====================
spring.datasource.url=${DB_URL:${ENROLLMENT_DB_URL:jdbc:mysql://localhost:3306/edulearn_enrollment?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}


# ==================== JPA/Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

# ==================== JWT Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==================== Application Name ====================
spring.application.name=enrollment-service

# NOTE: Spring Boot does not auto-load .env files without extra libraries.
# Keep explicit defaults here so local startup works predictably.
course.service.url=${COURSE_SERVICE_URL:http://localhost:8082/api/v1}

# ==================== Eureka Client Configuration ====================
# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# ==================== Spring Cloud Compatibility ====================
spring.cloud.compatibility-verifier.enabled=false

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.edulearn.enrollment=DEBUG

# ==================== RabbitMQ Configuration ====================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
