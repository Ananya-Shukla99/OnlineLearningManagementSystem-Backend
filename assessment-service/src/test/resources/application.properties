# ==================== Server Configuration ====================
server.port=8084
server.servlet.context-path=/api/v1

# ==================== Application Name ====================
spring.application.name=assessment-service-test

# ==================== Database Configuration (H2 in-memory for tests) ====================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ==================== JPA/Hibernate Configuration ====================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# ==================== Redis - Disable for tests ====================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ==================== Security Configuration ====================
jwt.secret=testSecretKeyForJWTAuthenticationInEduLearnTestEnvironment2024TestKey123!@#
jwt.expiration=86400000

# ==================== Microservice URLs (not used in controller tests) ====================
enrollment.service.url=http://localhost:8082/api/v1
lesson.service.url=http://localhost:8083/api/v1

# ==================== Logging ====================
logging.level.root=WARN
logging.level.com.edulearn.assessment=DEBUG

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false