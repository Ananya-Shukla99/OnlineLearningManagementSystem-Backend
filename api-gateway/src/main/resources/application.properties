# ==================== Server Configuration ====================
server.port=8080
server.servlet.context-path=/

# ==================== Application Name ====================
spring.application.name=api-gateway

# ==================== Eureka Client Configuration ====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

# ==================== Spring Cloud Gateway Configuration ====================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ==================== Gateway Routes Configuration ====================

# Auth Service Route
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Course Service Route
spring.cloud.gateway.routes[1].id=course-service
spring.cloud.gateway.routes[1].uri=lb://course-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/courses/**

# Lesson Service Route
spring.cloud.gateway.routes[2].id=lesson-service
spring.cloud.gateway.routes[2].uri=lb://${LESSON_SERVICE_ID:lesson-service}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/lessons/**

# Enrollment Service Route
spring.cloud.gateway.routes[3].id=enrollment-service
spring.cloud.gateway.routes[3].uri=lb://enrollment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/enrollments/**

# Assessment Service Route
spring.cloud.gateway.routes[4].id=assessment-service
spring.cloud.gateway.routes[4].uri=lb://assessment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/assessments/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/v1/assessments/(?<segment>.*), /api/assessments/$\{segment}

# Payment Service Route
spring.cloud.gateway.routes[5].id=payment-service
spring.cloud.gateway.routes[5].uri=lb://payment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/payments/**,/api/v1/subscriptions/**

# Progress Service Route
spring.cloud.gateway.routes[6].id=progress-service
spring.cloud.gateway.routes[6].uri=lb://progress-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/progress/**,/api/v1/certificates/**

# Discussion Service Route
spring.cloud.gateway.routes[7].id=discussion-service
spring.cloud.gateway.routes[7].uri=lb://discussion-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/discussion/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/api/v1/discussion/(?<segment>.*), /api/discussion/$\{segment}

# Notification Service Route
spring.cloud.gateway.routes[8].id=notification-service
spring.cloud.gateway.routes[8].uri=lb://notification-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/notifications/**
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/api/v1/notifications/(?<segment>.*), /api/notifications/$\{segment}

# ==================== Aggregated OpenAPI Routes ====================
spring.cloud.gateway.routes[9].id=auth-openapi
spring.cloud.gateway.routes[9].uri=lb://auth-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/v3/api-docs/auth
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/v3/api-docs/auth, /v3/api-docs

spring.cloud.gateway.routes[10].id=course-openapi
spring.cloud.gateway.routes[10].uri=lb://course-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/v3/api-docs/course
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/v3/api-docs/course, /v3/api-docs

spring.cloud.gateway.routes[11].id=lesson-openapi
spring.cloud.gateway.routes[11].uri=lb://lesson-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/v3/api-docs/lesson
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/v3/api-docs/lesson, /v3/api-docs

spring.cloud.gateway.routes[12].id=enrollment-openapi
spring.cloud.gateway.routes[12].uri=lb://enrollment-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/v3/api-docs/enrollment
spring.cloud.gateway.routes[12].filters[0]=RewritePath=/v3/api-docs/enrollment, /v3/api-docs

spring.cloud.gateway.routes[13].id=assessment-openapi
spring.cloud.gateway.routes[13].uri=lb://assessment-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/v3/api-docs/assessment
spring.cloud.gateway.routes[13].filters[0]=RewritePath=/v3/api-docs/assessment, /v3/api-docs

spring.cloud.gateway.routes[14].id=payment-openapi
spring.cloud.gateway.routes[14].uri=lb://payment-service
spring.cloud.gateway.routes[14].predicates[0]=Path=/v3/api-docs/payment
spring.cloud.gateway.routes[14].filters[0]=RewritePath=/v3/api-docs/payment, /v3/api-docs

spring.cloud.gateway.routes[15].id=progress-openapi
spring.cloud.gateway.routes[15].uri=lb://progress-service
spring.cloud.gateway.routes[15].predicates[0]=Path=/v3/api-docs/progress
spring.cloud.gateway.routes[15].filters[0]=RewritePath=/v3/api-docs/progress, /v3/api-docs

spring.cloud.gateway.routes[16].id=discussion-openapi
spring.cloud.gateway.routes[16].uri=lb://discussion-service
spring.cloud.gateway.routes[16].predicates[0]=Path=/v3/api-docs/discussion
spring.cloud.gateway.routes[16].filters[0]=RewritePath=/v3/api-docs/discussion, /v3/api-docs

spring.cloud.gateway.routes[17].id=notification-openapi
spring.cloud.gateway.routes[17].uri=lb://notification-service
spring.cloud.gateway.routes[17].predicates[0]=Path=/v3/api-docs/notification
spring.cloud.gateway.routes[17].filters[0]=RewritePath=/v3/api-docs/notification, /v3/api-docs

# New Lesson Service Route (explicit alias path)
spring.cloud.gateway.routes[18].id=new-lesson-service
spring.cloud.gateway.routes[18].uri=lb://new-lesson-service
spring.cloud.gateway.routes[18].predicates[0]=Path=/api/v1/new-lessons/**
spring.cloud.gateway.routes[18].filters[0]=RewritePath=/api/v1/new-lessons(?<segment>/?.*), /api/v1/lessons$\{segment}

# New Lesson Service OpenAPI
spring.cloud.gateway.routes[19].id=new-lesson-openapi
spring.cloud.gateway.routes[19].uri=lb://new-lesson-service
spring.cloud.gateway.routes[19].predicates[0]=Path=/v3/api-docs/new-lesson
spring.cloud.gateway.routes[19].filters[0]=RewritePath=/v3/api-docs/new-lesson, /v3/api-docs

# ==================== Swagger UI Aggregation ====================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/v3/api-docs/auth
springdoc.swagger-ui.urls[1].name=Course Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/course
springdoc.swagger-ui.urls[2].name=Lesson Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/lesson
springdoc.swagger-ui.urls[3].name=Enrollment Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/enrollment
springdoc.swagger-ui.urls[4].name=Assessment Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/assessment
springdoc.swagger-ui.urls[5].name=Payment Service
springdoc.swagger-ui.urls[5].url=/v3/api-docs/payment
springdoc.swagger-ui.urls[6].name=Progress Service
springdoc.swagger-ui.urls[6].url=/v3/api-docs/progress
springdoc.swagger-ui.urls[7].name=Discussion Service
springdoc.swagger-ui.urls[7].url=/v3/api-docs/discussion
springdoc.swagger-ui.urls[8].name=Notification Service
springdoc.swagger-ui.urls[8].url=/v3/api-docs/notification
springdoc.swagger-ui.urls[9].name=New Lesson Service
springdoc.swagger-ui.urls[9].url=/v3/api-docs/new-lesson

# Global Gateway Configuration
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=10000ms
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Global CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200,http://localhost:4300,http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true


# ==================== Spring Cloud Compatibility ====================
# Disable version check as Spring Boot 3.5.13 is newer than Spring Cloud 2023.0.3 expects
spring.cloud.compatibility-verifier.enabled=false

# ==================== JWT Configuration ====================
jwt.secret=${JWT_SECRET:mySecretKeyForJWTAuthenticationInEduLearnMicroserviceArchitecture2024SuperSecureKey123!@#}
jwt.expiration=86400000

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.edulearn=DEBUG

